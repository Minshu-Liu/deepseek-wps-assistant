<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek 助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 13px;
            color: #333;
            background: #f5f5f5;
            width: 300px;
            max-width: 100%;
            padding: 12px;
        }

        .brand {
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
        }

        .brand-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .brand-title-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo {
            height: 32px;
            width: auto;
        }

        .brand-subtitle {
            margin-top: 6px;
            font-size: 11px;
            color: #999;
            text-align: center;
        }

        h1 {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }

        #settingsBtn {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 4px;
            line-height: 1;
            border-radius: 4px;
            flex-shrink: 0;
        }

        #settingsBtn .settings-label {
            font-size: 11px;
            color: #666;
        }

        #settingsBtn .settings-icon {
            font-size: 16px;
            color: #666;
        }

        #settingsBtn:hover {
            background: #e8f0fa;
        }

        #settingsBtn:hover .settings-label,
        #settingsBtn:hover .settings-icon {
            color: #4a90d9;
        }

        #settingsPanel {
            display: none;
            margin-bottom: 12px;
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        #settingsPanel.open {
            display: block;
        }

        .quick-actions {
            display: flex;
            gap: 6px;
            margin: 10px 0;
        }

        .quick-actions button {
            flex: 1;
            width: 25%;
            height: 30px;
            padding: 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            color: #555;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
        }

        .quick-actions button:hover {
            border-color: #4a90d9;
            color: #4a90d9;
        }

        #apiKey {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            background: #fff;
        }

        #apiKey:focus {
            outline: none;
            border-color: #4a90d9;
        }

        #saveKeyBtn {
            width: 100%;
            margin-top: 8px;
            padding: 8px 12px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        #saveKeyBtn:hover {
            background: #3a7bc8;
        }

        #saveHint {
            display: none;
            margin-top: 6px;
            font-size: 12px;
            color: #27ae60;
            text-align: center;
        }

        #saveHint.error {
            color: #c0392b;
        }

        label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        #question {
            width: 100%;
            min-height: 100px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-size: 13px;
            font-family: inherit;
            background: #fff;
        }

        #question:focus {
            outline: none;
            border-color: #4a90d9;
        }

        #askBtn {
            width: 100%;
            margin-top: 10px;
            padding: 8px 12px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        #askBtn:hover:not(:disabled) {
            background: #3a7bc8;
        }

        #askBtn:disabled {
            background: #a0c4e8;
            cursor: not-allowed;
        }

        #resultArea {
            margin-top: 14px;
        }

        #resultLabel {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        #result {
            min-height: 120px;
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
        }

        #result.loading {
            color: #888;
            font-style: italic;
        }

        #result.error {
            color: #c0392b;
            border-color: #e74c3c;
            background: #fdf2f2;
        }

        #replaceBtn {
            display: none;
            width: 100%;
            height: 30px;
            margin-top: 8px;
            padding: 0;
            background: #27ae60;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
        }

        #replaceBtn:hover {
            background: #219a52;
        }

        #replaceHint {
            display: none;
            margin-top: 6px;
            font-size: 12px;
            color: #27ae60;
            text-align: center;
        }

        .usage-tip {
            margin-top: 10px;
            font-size: 11px;
            color: #999;
            line-height: 1.6;
        }

        .hidden {
            display: none;
        }

        #setupPanel {
            padding: 16px 0;
        }

        .setup-title {
            font-size: 13px;
            color: #333;
            text-align: center;
            margin-bottom: 16px;
        }

        .setup-field {
            margin-bottom: 12px;
        }

        .setup-select {
            width: 100%;
            height: 32px;
            padding: 0 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            background: #fff;
        }

        .setup-select:focus {
            outline: none;
            border-color: #4a90d9;
        }

        #setupConfirmBtn {
            width: 100%;
            margin-top: 8px;
            padding: 8px 12px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        #setupConfirmBtn:hover {
            background: #3a7bc8;
        }

        .settings-field {
            margin-bottom: 12px;
        }
    </style>
    <script src="./main.js"></script>
</head>
<body>
    <div class="brand">
        <div class="brand-title-row">
            <div class="brand-title-left">
                <img src="./images/logo.png" alt="源流数字" class="brand-logo">
                <h1>源流WPS助手</h1>
            </div>
            <button id="settingsBtn" type="button" title="设置">
                <span class="settings-icon">⚙</span>
                <span class="settings-label">设置</span>
            </button>
        </div>
        <p class="brand-subtitle">由 DeepSeek 大模型驱动 · 源流数字出品</p>
    </div>

    <div id="settingsPanel">
        <div class="settings-field">
            <label for="settingsRoleSelect">角色定位</label>
            <select id="settingsRoleSelect" class="setup-select">
                <option value="不限">不限</option>
                <option value="律师">律师</option>
                <option value="政府工作人员">政府工作人员</option>
                <option value="企业管理者">企业管理者</option>
                <option value="财务人员">财务人员</option>
                <option value="项目经理">项目经理</option>
                <option value="市场营销人员">市场营销人员</option>
                <option value="技术工程师">技术工程师</option>
            </select>
        </div>
        <div class="settings-field">
            <label for="settingsDocTypeSelect">文档类型</label>
            <select id="settingsDocTypeSelect" class="setup-select">
                <option value="自动识别">自动识别</option>
                <option value="合同协议">合同协议</option>
                <option value="政策文件">政策文件</option>
                <option value="商业报告">商业报告</option>
                <option value="邮件函件">邮件函件</option>
                <option value="新闻稿">新闻稿</option>
                <option value="通用文本">通用文本</option>
            </select>
        </div>
        <label for="apiKey">API Key</label>
        <input id="apiKey" type="password" placeholder="请输入您的 DeepSeek API Key">
        <button id="saveKeyBtn" type="button">保存</button>
        <div id="saveHint">已保存</div>
    </div>

    <div id="setupPanel">
        <p class="setup-title">开始前，请完成以下设置</p>
        <div class="setup-field">
            <label for="roleSelect">您的角色定位</label>
            <select id="roleSelect" class="setup-select">
                <option value="不限">不限</option>
                <option value="律师">律师</option>
                <option value="政府工作人员">政府工作人员</option>
                <option value="企业管理者">企业管理者</option>
                <option value="财务人员">财务人员</option>
                <option value="项目经理">项目经理</option>
                <option value="市场营销人员">市场营销人员</option>
                <option value="技术工程师">技术工程师</option>
            </select>
        </div>
        <div class="setup-field">
            <label for="docTypeSelect">当前文档类型</label>
            <select id="docTypeSelect" class="setup-select">
                <option value="自动识别">自动识别</option>
                <option value="合同协议">合同协议</option>
                <option value="政策文件">政策文件</option>
                <option value="商业报告">商业报告</option>
                <option value="邮件函件">邮件函件</option>
                <option value="新闻稿">新闻稿</option>
                <option value="通用文本">通用文本</option>
            </select>
        </div>
        <button id="setupConfirmBtn" type="button">开始使用</button>
    </div>

    <div id="mainPanel" class="hidden">
    <div class="quick-actions">
        <button type="button" id="quickPolish">润色</button>
        <button type="button" id="quickTranslate">翻译</button>
        <button type="button" id="quickContinue">续写</button>
        <button type="button" id="quickSummarize">总结</button>
    </div>

    <label for="question">输入问题</label>
    <textarea id="question" placeholder="请输入您的问题..."></textarea>

    <button id="askBtn" type="button">询问 DeepSeek</button>

    <div id="resultArea">
        <div id="resultLabel">回答</div>
        <div id="result">等待提问...</div>
        <button id="replaceBtn" type="button">替换选中文字</button>
        <div id="replaceHint">已替换</div>
        <p class="usage-tip">💡 润色/翻译/续写/总结：请先在文档中选中文字，点击对应按钮即可。结果满意后点击「替换选中文字」将结果写入文档。</p>
    </div>
    </div>

    <script>
        (function () {
            var API_URL = "https://api.deepseek.com/v1/chat/completions";
            var STORAGE_KEY = "deepseek_api_key";
            var ROLE_KEY = "user_role";
            var DOC_TYPE_KEY = "doc_type";
            var MODEL = "deepseek-chat";

            var settingsBtn = document.getElementById("settingsBtn");
            var settingsPanel = document.getElementById("settingsPanel");
            var setupPanel = document.getElementById("setupPanel");
            var mainPanel = document.getElementById("mainPanel");
            var roleSelect = document.getElementById("roleSelect");
            var docTypeSelect = document.getElementById("docTypeSelect");
            var setupConfirmBtn = document.getElementById("setupConfirmBtn");
            var settingsRoleSelect = document.getElementById("settingsRoleSelect");
            var settingsDocTypeSelect = document.getElementById("settingsDocTypeSelect");
            var apiKeyEl = document.getElementById("apiKey");
            var saveKeyBtn = document.getElementById("saveKeyBtn");
            var saveHint = document.getElementById("saveHint");
            var questionEl = document.getElementById("question");
            var askBtn = document.getElementById("askBtn");
            var resultEl = document.getElementById("result");
            var replaceBtn = document.getElementById("replaceBtn");
            var replaceHint = document.getElementById("replaceHint");
            var quickBtns = document.querySelectorAll(".quick-actions button");

            function syncSelectValues(sourceRole, sourceDocType) {
                roleSelect.value = sourceRole;
                docTypeSelect.value = sourceDocType;
                settingsRoleSelect.value = sourceRole;
                settingsDocTypeSelect.value = sourceDocType;
            }

            function saveUserPrefs(role, docType) {
                localStorage.setItem(ROLE_KEY, role);
                localStorage.setItem(DOC_TYPE_KEY, docType);
                syncSelectValues(role, docType);
            }

            function showMainPanel() {
                setupPanel.classList.add("hidden");
                mainPanel.classList.remove("hidden");
            }

            function showSetupPanel() {
                setupPanel.classList.remove("hidden");
                mainPanel.classList.add("hidden");
            }

            var savedKey = localStorage.getItem(STORAGE_KEY);
            if (savedKey) {
                apiKeyEl.value = savedKey;
            }

            var savedRole = localStorage.getItem(ROLE_KEY);
            var savedDocType = localStorage.getItem(DOC_TYPE_KEY);
            if (savedRole && savedDocType) {
                syncSelectValues(savedRole, savedDocType);
                showMainPanel();
            } else {
                if (savedRole) {
                    roleSelect.value = savedRole;
                    settingsRoleSelect.value = savedRole;
                }
                if (savedDocType) {
                    docTypeSelect.value = savedDocType;
                    settingsDocTypeSelect.value = savedDocType;
                }
                showSetupPanel();
            }

            setupConfirmBtn.addEventListener("click", function () {
                saveUserPrefs(roleSelect.value, docTypeSelect.value);
                showMainPanel();
            });

            settingsBtn.addEventListener("click", function () {
                settingsPanel.classList.toggle("open");
                saveHint.style.display = "none";
            });

            saveKeyBtn.addEventListener("click", function () {
                var key = apiKeyEl.value.trim();
                if (!key) {
                    saveHint.textContent = "请输入 API Key";
                    saveHint.className = "error";
                    saveHint.style.display = "block";
                    return;
                }
                localStorage.setItem(STORAGE_KEY, key);
                localStorage.setItem(ROLE_KEY, settingsRoleSelect.value);
                localStorage.setItem(DOC_TYPE_KEY, settingsDocTypeSelect.value);
                syncSelectValues(settingsRoleSelect.value, settingsDocTypeSelect.value);
                saveHint.textContent = "已保存";
                saveHint.className = "";
                saveHint.style.display = "block";
                setTimeout(function () {
                    saveHint.style.display = "none";
                    settingsPanel.classList.remove("open");
                }, 800);
            });

            function setLoading(isLoading) {
                askBtn.disabled = isLoading;
                askBtn.textContent = isLoading ? "思考中..." : "询问 DeepSeek";
                quickBtns.forEach(function (btn) {
                    btn.disabled = isLoading;
                });
                if (isLoading) {
                    resultEl.className = "loading";
                    resultEl.textContent = "思考中...";
                    replaceBtn.style.display = "none";
                    replaceHint.style.display = "none";
                }
            }

            function showError(message) {
                resultEl.className = "error";
                resultEl.textContent = message;
                replaceBtn.style.display = "none";
                replaceHint.style.display = "none";
            }

            function showResult(text, showReplace) {
                if (showReplace === undefined) {
                    showReplace = false;
                }
                resultEl.className = "";
                resultEl.textContent = text;
                replaceBtn.style.display = showReplace ? "block" : "none";
                replaceHint.style.display = "none";
            }

            function resetActionButtons() {
                askBtn.disabled = false;
                askBtn.textContent = "询问 DeepSeek";
                quickBtns.forEach(function (btn) {
                    btn.disabled = false;
                });
            }

            function getSelectionText() {
                try {
                    return window.Application.ActiveDocument.ActiveWindow.Selection.Text || "";
                } catch (e) {
                    return "";
                }
            }

            function callDeepSeek(apiKey, prompt, showReplace) {
                setLoading(true);

                var userRole = localStorage.getItem(ROLE_KEY) || "不限";
                var docType = localStorage.getItem(DOC_TYPE_KEY) || "自动识别";
                var systemPrompt;

                if (userRole === "不限" && docType === "自动识别") {
                    systemPrompt = "你是一位专业的办公助手，请根据文档内容自动判断文档类型，以符合该文档风格的方式处理文字。";
                } else {
                    systemPrompt = "你是一位" + userRole + "，正在处理一份" + docType + "类型的文档（如果文档类型是\"自动识别\"，请根据内容自动判断）。请始终站在该角色的专业视角，以符合该文档类型的风格和规范来处理文字。";
                }

                fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + apiKey
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        stream: false,
                        system: systemPrompt,
                        messages: [
                            { role: "user", content: prompt }
                        ]
                    })
                })
                    .then(function (response) {
                        return response.json().then(function (data) {
                            if (!response.ok) {
                                var errMsg = (data.error && data.error.message)
                                    ? data.error.message
                                    : ("请求失败，HTTP " + response.status);
                                throw new Error(errMsg);
                            }
                            return data;
                        });
                    })
                    .then(function (data) {
                        var content = data.choices &&
                            data.choices[0] &&
                            data.choices[0].message &&
                            data.choices[0].message.content;

                        if (!content) {
                            throw new Error("API 返回数据格式异常，未找到回答内容。");
                        }

                        showResult(content, showReplace);
                    })
                    .catch(function (err) {
                        showError("错误：" + (err.message || String(err)));
                    })
                    .finally(function () {
                        resetActionButtons();
                    });
            }

            function runQuickAction(prompt) {
                var apiKey = localStorage.getItem(STORAGE_KEY);
                if (!apiKey) {
                    showError("请先点击 ⚙设置 配置您的 API Key");
                    return;
                }
                callDeepSeek(apiKey, prompt, true);
            }

            askBtn.addEventListener("click", function () {
                var apiKey = localStorage.getItem(STORAGE_KEY);
                if (!apiKey) {
                    showError("请先点击 ⚙ 设置您的 API Key");
                    return;
                }

                var question = questionEl.value.trim();
                if (!question) {
                    showError("请输入问题后再提交。");
                    return;
                }

                callDeepSeek(apiKey, question, false);
            });

            replaceBtn.addEventListener("click", function () {
                try {
                    var sel = window.Application.ActiveDocument.ActiveWindow.Selection;
                    sel.Delete();
                    var insertText = resultEl.textContent.replace(/^[\r\n]+|[\r\n]+$/g, "");
                    sel.InsertAfter(insertText);
                    replaceBtn.style.display = "none";
                    replaceHint.style.display = "block";
                    setTimeout(function () {
                        replaceHint.style.display = "none";
                    }, 1000);
                } catch (e) {
                    showError("替换失败，请确认文档中仍有选中文字");
                }
            });

            document.getElementById("quickPolish").addEventListener("click", function () {
                var text = getSelectionText().trim();
                if (!text) {
                    showError("请先在文档中选中文字");
                    return;
                }
                runQuickAction("请对以下文字进行润色，使其更加流畅、专业，直接输出润色后的文字，不要解释：\n\n" + text);
            });

            document.getElementById("quickTranslate").addEventListener("click", function () {
                var text = getSelectionText().trim();
                if (!text) {
                    showError("请先在文档中选中文字");
                    return;
                }
                runQuickAction("请判断以下文字的语言：如果是中文，翻译成英文；如果是英文，翻译成中文。直接输出翻译结果，不要解释：\n\n" + text);
            });

            document.getElementById("quickContinue").addEventListener("click", function () {
                var text = getSelectionText().trim();
                if (!text) {
                    showError("请先在文档中选中文字");
                    return;
                }
                runQuickAction("请对以下文字进行续写，保持风格一致，直接输出续写内容，不要解释：\n\n" + text);
            });

            document.getElementById("quickSummarize").addEventListener("click", function () {
                var text = getSelectionText().trim();
                if (!text) {
                    try {
                        text = (window.Application.ActiveDocument.Content.Text || "").trim();
                    } catch (e) {
                        text = "";
                    }
                }
                if (!text) {
                    showError("文档内容为空，无法总结");
                    return;
                }
                runQuickAction("请对以下文字进行总结，提炼核心要点，直接输出总结内容，不要解释：\n\n" + text);
            });
        })();
    </script>
</body>
</html>
<!--这个文件是wps加载项的入口文件，wps在启动时加载这个文件-->
