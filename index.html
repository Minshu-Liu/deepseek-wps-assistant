<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>源流WPS助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 13px;
            color: #333;
            background: #CCE8CF;
            width: 100%;
            min-width: 300px;
            max-width: 100%;
            box-sizing: border-box;
            padding: 12px;
        }

        .brand {
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid #5A9A5E;
        }

        .brand-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .brand-title-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo {
            height: 32px;
            width: auto;
        }

        .brand-subtitle {
            margin-top: 6px;
            font-size: 11px;
            color: #999;
            text-align: center;
        }

        h1 {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }

        #settingsBtn {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 4px;
            line-height: 1;
            border-radius: 4px;
            flex-shrink: 0;
        }

        #settingsBtn .settings-label {
            font-size: 11px;
            color: #666;
        }

        #settingsBtn .settings-icon {
            font-size: 16px;
            color: #666;
        }

        #settingsBtn:hover {
            background: #e8f0fa;
        }

        #settingsBtn:hover .settings-label,
        #settingsBtn:hover .settings-icon {
            color: #4a90d9;
        }

        #settingsPanel {
            display: none;
            margin-bottom: 12px;
            padding: 10px;
            background: #CCE8CF;
            border: 1px solid #5A9A5E;
            border-radius: 4px;
        }

        #settingsPanel.open {
            display: block;
        }

        .quick-actions {
            display: block;
            gap: 8px;
            align-items: flex-start;
            margin: 10px 0;
        }

        .quick-actions button {
            padding: 6px 12px;
            background: #CCE8CF;
            border: 1px solid #5A9A5E;
            border-radius: 4px;
            color: #333;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
        }

        .quick-actions button:hover {
            border-color: #4a90d9;
            color: #4a90d9;
        }

        #apiKey {
            width: 100%;
            padding: 8px;
            border: 1px solid #5A9A5E;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            background: #CCE8CF;
        }

        #apiKey:focus {
            outline: none;
            border-color: #4a90d9;
        }

        #saveKeyBtn {
            width: 50%;
            margin-top: 8px;
            padding: 8px 12px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        #saveKeyBtn:hover {
            background: #3a7bc8;
        }

        #resetKeyBtn {
            width: 50%;
            margin-top: 8px;
            padding: 8px 12px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }
        #resetKeyBtn:hover {
            background: #3a7bc8;
        }

        #saveHint {
            display: none;
            margin-top: 6px;
            font-size: 12px;
            color: #27ae60;
            text-align: center;
        }

        #saveHint.error {
            color: #c0392b;
        }

        label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        #question {
            width: 100%;
            min-height: 100px;
            padding: 8px;
            border: 1px solid #5A9A5E;
            border-radius: 4px;
            resize: vertical;
            font-size: 13px;
            font-family: inherit;
            background: #CCE8CF;
        }

        #question:focus {
            outline: none;
            border-color: #4a90d9;
        }

        #askBtn {
            width: 100%;
            margin-top: 10px;
            padding: 8px 12px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        #askBtn:hover:not(:disabled) {
            background: #3a7bc8;
        }

        #askBtn:disabled {
            background: #a0c4e8;
            cursor: not-allowed;
        }

        #resultArea {
            margin-top: 14px;
        }

        #resultLabel {
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        #result {
            min-height: 120px;
            padding: 10px;
            background: #CCE8CF;
            border: 1px solid #5A9A5E;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
        }

        #result.loading {
            color: #888;
            font-style: italic;
        }

        #result.error {
            color: #c0392b;
            border-color: #e74c3c;
            background: #fdf2f2;
        }

        #replaceBtn {
            display: none;
            width: 100%;
            height: 30px;
            margin-top: 8px;
            padding: 0;
            background: #27ae60;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
        }

        #replaceBtn:hover {
            background: #219a52;
        }

        #replaceHint {
            display: none;
            margin-top: 6px;
            font-size: 12px;
            color: #27ae60;
            text-align: center;
        }

        .usage-tip {
            margin-top: 10px;
            font-size: 11px;
            color: #999;
            line-height: 1.6;
        }

        .hidden {
            display: none;
        }

        .setup-title {
            font-size: 13px;
            color: #333;
            text-align: center;
            margin-bottom: 16px;
        }

        .setup-field {
            margin-bottom: 12px;
        }

        .setup-select {
            width: 100%;
            height: 32px;
            padding: 0 8px;
            border: 1px solid #5A9A5E;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            background: #CCE8CF;
        }

        .setup-select:focus {
            outline: none;
            border-color: #4a90d9;
        }

        #setupConfirmBtn {
            width: 100%;
            margin-top: 8px;
            padding: 8px 12px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        #setupConfirmBtn:hover {
            background: #3a7bc8;
        }

        .settings-field {
            margin-bottom: 12px;
        }

        .quick-group { display: block; margin-bottom: 10px; }
        .quick-group-label { display: block; font-size: 12px; color: #555; font-weight: bold; margin-bottom: 4px; }
        .quick-group-buttons { display: flex; flex-wrap: wrap; gap: 6px; justify-content: space-between; }

        .precision-section { background: transparent; border: 1px solid #5A9A5E; border-radius: 6px; padding: 10px; margin-bottom: 10px; }
        .precision-title { font-size: 13px; font-weight: bold; color: #333; margin-bottom: 8px; }
        .precision-row { margin-bottom: 6px; }
        .precision-row label { font-size: 12px; color: #555; display: block; margin-bottom: 2px; }
    </style>
    <script src="./main.js"></script>
</head>
<body>
    <div class="brand">
        <div class="brand-title-row">
            <div class="brand-title-left">
                <img src="./images/logo.png" alt="源流数字" class="brand-logo">
                <h1>源流WPS助手</h1>
            </div>
            <button id="settingsBtn" type="button" title="设置">
                <span class="settings-icon">⚙</span>
                <span class="settings-label">设置</span>
            </button>
        </div>
        <p class="brand-subtitle">由 DeepSeek 大模型驱动 · 源流数字出品</p>
    </div>

    <div id="settingsPanel">
        <label for="apiKey">DeepSeek API Key</label>
        <input id="apiKey" type="password" placeholder="请在此处添加您自己的 DeepSeek API Key">
        <div style="display:flex;gap:8px;">
            <button id="saveKeyBtn" type="button">保存</button>
            <button id="resetKeyBtn" type="button">重置</button>
        </div>
        <div id="saveHint">已保存</div>
    </div>

    <div id="mainPanel" class="">
    <div class="precision-section">
        <div class="precision-title">精准匹配</div>
        <div class="precision-row">
            <label>您的角色定位</label>
            <select id="mainRoleSelect" class="setup-select">
                <option value="不限">不限</option>
                <option value="律师">律师</option>
                <option value="政府工作人员">政府工作人员</option>
                <option value="企业管理者">企业管理者</option>
                <option value="财务人员">财务人员</option>
                <option value="项目经理">项目经理</option>
                <option value="市场营销人员">市场营销人员</option>
                <option value="技术工程师">技术工程师</option>
            </select>
        </div>
        <div class="precision-row">
            <label>当前文档类型</label>
            <select id="mainDocTypeSelect" class="setup-select">
                <option value="自动识别">自动识别</option>
                <option value="合同协议">合同协议</option>
                <option value="政策文件">政策文件</option>
                <option value="商业报告">商业报告</option>
                <option value="邮件函件">邮件函件</option>
                <option value="新闻稿">新闻稿</option>
                <option value="通用文本">通用文本</option>
            </select>
        </div>
        <div class="precision-row">
            <label>文档受众</label>
            <select id="audienceSelect" class="setup-select">
                <option value="不限">不限</option>
                <option value="普通大众">普通大众</option>
                <option value="专业人士">专业人士</option>
                <option value="政府/监管机构">政府/监管机构</option>
                <option value="投资人/金融机构">投资人/金融机构</option>
                <option value="学生/教育场景">学生/教育场景</option>
                <option value="企业管理层">企业管理层</option>
            </select>
        </div>
    </div>
    <div class="quick-actions">
        <div class="quick-group">
            <span class="quick-group-label">写作类</span>
            <div class="quick-group-buttons">
                <button type="button" id="quickPolish">润色</button>
                <button type="button" id="quickContinue">续写</button>
                <button type="button" id="quickExpand">扩写</button>
                <button type="button" id="quickRewrite">改写</button>
            </div>
        </div>
        <div class="quick-group">
            <span class="quick-group-label">整理类</span>
            <div class="quick-group-buttons">
                <button type="button" id="quickSummarize">总结</button>
                <button type="button" id="quickShrink">缩写</button>
                <button type="button" id="quickProofread">纠错</button>
                <button type="button" id="quickAbstract">摘要</button>
            </div>
        </div>
        <div class="quick-group">
            <span class="quick-group-label">翻译类</span>
            <div class="quick-group-buttons" style="justify-content: flex-start;">
                <button type="button" id="quickTranslate">中英翻译</button>
                <button type="button" id="quickTone">转换语气</button>
            </div>
        </div>
    </div>

    <label for="question">输入问题</label>
    <textarea id="question" placeholder="请输入您的问题..."></textarea>

    <button id="askBtn" type="button">询问 DeepSeek</button>

    <div id="resultArea">
        <div id="resultLabel">回答</div>
        <div id="result">等待提问...</div>
        <button id="replaceBtn" type="button">替换选中文字</button>
        <div id="replaceHint">已替换</div>
        <p class="usage-tip">💡 润色/翻译/续写/总结：请先在文档中选中文字，点击对应按钮即可。结果满意后点击「替换选中文字」将结果写入文档。</p>
    </div>
    </div>

    <script>
        (function () {
            var API_URL = "https://api.deepseek.com/v1/chat/completions";
            var STORAGE_KEY = "deepseek_api_key";
            var ROLE_KEY = "user_role";
            var DOC_TYPE_KEY = "doc_type";
            var MODEL = "deepseek-chat";

            var settingsBtn = document.getElementById("settingsBtn");
            var settingsPanel = document.getElementById("settingsPanel");
            var mainPanel = document.getElementById("mainPanel");
            var settingsRoleSelect = document.getElementById("settingsRoleSelect");
            var settingsDocTypeSelect = document.getElementById("settingsDocTypeSelect");
            var mainRoleSelect = document.getElementById("mainRoleSelect");
            var mainDocTypeSelect = document.getElementById("mainDocTypeSelect");
            var audienceSelect = document.getElementById("audienceSelect");
            var AUDIENCE_KEY = "wps_assistant_audience";
            var apiKeyEl = document.getElementById("apiKey");
            var saveKeyBtn = document.getElementById("saveKeyBtn");
            var saveHint = document.getElementById("saveHint");
            var questionEl = document.getElementById("question");
            var askBtn = document.getElementById("askBtn");
            var resultEl = document.getElementById("result");
            var replaceBtn = document.getElementById("replaceBtn");
            var replaceHint = document.getElementById("replaceHint");
            var quickBtns = document.querySelectorAll(".quick-actions button");

            function syncSelectValues(sourceRole, sourceDocType) {
                settingsRoleSelect.value = sourceRole;
                settingsDocTypeSelect.value = sourceDocType;
                if (mainRoleSelect) mainRoleSelect.value = sourceRole;
                if (mainDocTypeSelect) mainDocTypeSelect.value = sourceDocType;
            }

            function saveUserPrefs(role, docType) {
                localStorage.setItem(ROLE_KEY, role);
                localStorage.setItem(DOC_TYPE_KEY, docType);
                syncSelectValues(role, docType);
            }

            var savedKey = localStorage.getItem(STORAGE_KEY);
            if (savedKey) {
                apiKeyEl.value = savedKey;
            }

            var savedRole = localStorage.getItem(ROLE_KEY);
            var savedDocType = localStorage.getItem(DOC_TYPE_KEY);
            if (savedRole && savedDocType) {
                syncSelectValues(savedRole, savedDocType);
            } else {
                if (savedRole) {
                    settingsRoleSelect.value = savedRole;
                    if (mainRoleSelect) mainRoleSelect.value = savedRole;
                }
                if (savedDocType) {
                    settingsDocTypeSelect.value = savedDocType;
                    if (mainDocTypeSelect) mainDocTypeSelect.value = savedDocType;
                }
            }

            var savedAudience = localStorage.getItem(AUDIENCE_KEY);
            if (savedAudience) audienceSelect.value = savedAudience;

            mainRoleSelect.addEventListener("change", function() {
                saveUserPrefs(mainRoleSelect.value, mainDocTypeSelect.value);
            });
            mainDocTypeSelect.addEventListener("change", function() {
                saveUserPrefs(mainRoleSelect.value, mainDocTypeSelect.value);
            });
            audienceSelect.addEventListener("change", function() {
                localStorage.setItem(AUDIENCE_KEY, audienceSelect.value);
            });

            settingsBtn.addEventListener("click", function () {
                settingsPanel.classList.toggle("open");
                saveHint.style.display = "none";
            });

            saveKeyBtn.addEventListener("click", function () {
                var key = apiKeyEl.value.trim();
                if (!key) {
                    saveHint.textContent = "请输入 API Key";
                    saveHint.className = "error";
                    saveHint.style.display = "block";
                    return;
                }
                localStorage.setItem(STORAGE_KEY, key);
                localStorage.setItem(ROLE_KEY, settingsRoleSelect.value);
                localStorage.setItem(DOC_TYPE_KEY, settingsDocTypeSelect.value);
                syncSelectValues(settingsRoleSelect.value, settingsDocTypeSelect.value);
                saveHint.textContent = "已保存";
                saveHint.className = "";
                saveHint.style.display = "block";
                setTimeout(function () {
                    saveHint.style.display = "none";
                    settingsPanel.classList.remove("open");
                }, 800);
            });

            document.getElementById("resetKeyBtn").addEventListener("click", function() {
                localStorage.removeItem(STORAGE_KEY);
                document.getElementById("apiKey").value = "";
                document.getElementById("saveHint").textContent = "已重置";
                setTimeout(function() {
                    document.getElementById("saveHint").textContent = "";
                }, 2000);
            });

            function setLoading(isLoading) {
                askBtn.disabled = isLoading;
                askBtn.textContent = isLoading ? "思考中..." : "询问 DeepSeek";
                quickBtns.forEach(function (btn) {
                    btn.disabled = isLoading;
                });
                if (isLoading) {
                    resultEl.className = "loading";
                    resultEl.textContent = "思考中...";
                    replaceBtn.style.display = "none";
                    replaceHint.style.display = "none";
                }
            }

            function showError(message) {
                resultEl.className = "error";
                resultEl.textContent = message;
                replaceBtn.style.display = "none";
                replaceHint.style.display = "none";
            }

            function showResult(text, showReplace) {
                if (showReplace === undefined) {
                    showReplace = false;
                }
                resultEl.className = "";
                resultEl.textContent = text;
                replaceBtn.style.display = showReplace ? "block" : "none";
                replaceHint.style.display = "none";
            }

            function resetActionButtons() {
                askBtn.disabled = false;
                askBtn.textContent = "询问 DeepSeek";
                quickBtns.forEach(function (btn) {
                    btn.disabled = false;
                });
            }

            function getSelectionText() {
                try {
                    return window.Application.ActiveDocument.ActiveWindow.Selection.Text || "";
                } catch (e) {
                    return "";
                }
            }

            function callDeepSeek(apiKey, prompt, showReplace) {
                setLoading(true);

                var userRole = localStorage.getItem(ROLE_KEY) || "不限";
                var docType = localStorage.getItem(DOC_TYPE_KEY) || "自动识别";
                var audience = localStorage.getItem(AUDIENCE_KEY) || "不限";

                var rolePart = userRole !== "不限" ? userRole : "专业办公助手";
                var docPart = docType !== "自动识别" ? docType + "类型的文档" : "文档（请根据内容自动判断类型）";
                var audiencePart = audience !== "不限" ? audience : "";

                var systemPrompt = "你是一位" + rolePart + "，当前正在处理一份" + docPart + "。";
                if (audiencePart) {
                    systemPrompt += "本文档的目标受众是" + audiencePart + "。";
                }
                systemPrompt += "请严格遵守以下原则：\n";
                systemPrompt += "1. 始终以" + rolePart + "的专业视角和语言风格处理文字；\n";
                systemPrompt += "2. 输出内容必须符合" + docPart + "的格式规范和表达习惯；\n";
                if (audiencePart) {
                    systemPrompt += "3. 语言风格和专业深度要匹配" + audiencePart + "的认知水平和阅读习惯；\n";
                    systemPrompt += "4. 直接输出处理结果，不要解释你的处理过程。";
                } else {
                    systemPrompt += "3. 直接输出处理结果，不要解释你的处理过程。";
                }

                fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + apiKey
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        stream: false,
                        system: systemPrompt,
                        messages: [
                            { role: "user", content: prompt }
                        ]
                    })
                })
                    .then(function (response) {
                        return response.json().then(function (data) {
                            if (!response.ok) {
                                var errMsg = (data.error && data.error.message)
                                    ? data.error.message
                                    : ("请求失败，HTTP " + response.status);
                                throw new Error(errMsg);
                            }
                            return data;
                        });
                    })
                    .then(function (data) {
                        var content = data.choices &&
                            data.choices[0] &&
                            data.choices[0].message &&
                            data.choices[0].message.content;

                        if (!content) {
                            throw new Error("API 返回数据格式异常，未找到回答内容。");
                        }

                        showResult(content, showReplace);
                    })
                    .catch(function (err) {
                        showError("错误：" + (err.message || String(err)));
                    })
                    .finally(function () {
                        resetActionButtons();
                    });
            }

            function runQuickAction(prompt) {
                var apiKey = localStorage.getItem(STORAGE_KEY);
                if (!apiKey) {
                    showError("请先点击 ⚙设置 配置您的 API Key");
                    return;
                }
                callDeepSeek(apiKey, prompt, true);
            }

            askBtn.addEventListener("click", function () {
                var apiKey = localStorage.getItem(STORAGE_KEY);
                if (!apiKey) {
                    showError("请先点击 ⚙ 设置您的 API Key");
                    return;
                }

                var question = questionEl.value.trim();
                if (!question) {
                    showError("请输入问题后再提交。");
                    return;
                }

                callDeepSeek(apiKey, question, false);
            });

            replaceBtn.addEventListener("click", function () {
                try {
                    var sel = window.Application.ActiveDocument.ActiveWindow.Selection;
                    sel.Delete();
                    var insertText = resultEl.textContent.replace(/^[\r\n]+|[\r\n]+$/g, "");
                    sel.InsertAfter(insertText);
                    replaceBtn.style.display = "none";
                    replaceHint.style.display = "block";
                    setTimeout(function () {
                        replaceHint.style.display = "none";
                    }, 1000);
                } catch (e) {
                    showError("替换失败，请确认文档中仍有选中文字");
                }
            });

            document.getElementById("quickPolish").addEventListener("click", function () {
                var text = getSelectionText().trim();
                if (!text) {
                    showError("请先在文档中选中文字");
                    return;
                }
                runQuickAction("请对以下文字进行润色，使其更加流畅、专业，直接输出润色后的文字，不要解释：\n\n" + text);
            });

            document.getElementById("quickTranslate").addEventListener("click", function () {
                var text = getSelectionText().trim();
                if (!text) {
                    showError("请先在文档中选中文字");
                    return;
                }
                runQuickAction("请判断以下文字的语言：如果是中文，翻译成英文；如果是英文，翻译成中文。直接输出翻译结果，不要解释：\n\n" + text);
            });

            document.getElementById("quickContinue").addEventListener("click", function () {
                var text = getSelectionText().trim();
                if (!text) {
                    showError("请先在文档中选中文字");
                    return;
                }
                runQuickAction("请对以下文字进行续写，保持风格一致，直接输出续写内容，不要解释：\n\n" + text);
            });

            document.getElementById("quickSummarize").addEventListener("click", function () {
                var text = getSelectionText().trim();
                if (!text) {
                    try {

                runQuickAction("请对以下文字进行总结，提炼核心要点，直接输出总结内容，不要解释：\n\n" + text);

            document.getElementById("quickShrink").addEventListener("click", function () {

            document.getElementById("quickProofread").addEventListener("click", function () {

        })();
